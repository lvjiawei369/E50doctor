<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>飞奕E50空调诊断医生</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #fff;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Backdrop ── */
  #backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,.25);
  }
  #backdrop.open { display: block; }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 260px;
    z-index: 50;
    background: #f9fafb;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform .22s ease;
  }
  #sidebar.open {
    transform: translateX(0);
  }
  @media (min-width: 900px) {
    #sidebar {
      position: relative;
      transform: none;
      transition: none;
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      display: none;
    }
    #backdrop { display: none !important; }
  }

  #sidebar-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 52px;
    border-bottom: 1px solid #e5e7eb;
  }
  #sidebar-header span { font-size: 13px; font-weight: 600; color: #374151; }

  #new-chat-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none; background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  #new-chat-btn:hover { background: #e5e7eb; }

  #conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #conv-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px;
    padding: 40px 0;
    color: #9ca3af; font-size: 12px;
  }

  .conv-item {
    width: 100%; text-align: left;
    padding: 10px 14px;
    border: none; background: none; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    font-family: inherit;
    transition: background .12s;
  }
  .conv-item:hover { background: #f3f4f6; }
  .conv-item.active { background: #eff6ff; border-right: 2px solid #2563eb; }
  .conv-item-title {
    font-size: 13px; color: #374151;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 220px;
  }
  .conv-item.active .conv-item-title { color: #1d4ed8; font-weight: 500; }
  .conv-item-time { font-size: 11px; color: #9ca3af; }

  /* ── Main ── */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Nav ── */
  #nav {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    height: 52px;
    border-bottom: 1px solid #e5e7eb;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
  }
  #nav-left { display: flex; align-items: center; gap: 8px; }
  #nav-title { font-size: 15px; font-weight: 600; color: #111; }
  #nav-badge {
    font-size: 11px; color: #2563eb;
    border: 1px solid #bfdbfe; background: #eff6ff;
    border-radius: 999px; padding: 2px 8px;
    display: none; align-items: center; gap: 4px;
  }
  @media (min-width: 420px) { #nav-badge { display: flex; } }
  #nav-badge::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%; background: #3b82f6;
  }

  #menu-btn {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    transition: background .15s;
  }
  #menu-btn:hover { background: #f3f4f6; }

  #delete-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none; background: none;
    display: none; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  #delete-btn:hover { background: #fee2e2; }
  #delete-btn.visible { display: flex; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    background: #f9fafb;
    padding: 12px 0;
  }

  /* ── Welcome ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 20px 24px;
  }
  #welcome-icon {
    width: 76px; height: 76px; border-radius: 50%;
    background: #eff6ff; border: 1px solid #dbeafe;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin-bottom: 16px;
  }
  #welcome h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 8px; }
  #welcome p  { font-size: 13px; color: #6b7280; text-align: center; line-height: 1.6; margin-bottom: 24px; max-width: 280px; }
  #suggestions { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
  #suggestions > p { font-size: 11px; color: #9ca3af; text-align: center; margin-bottom: 4px; }
  .suggestion-btn {
    text-align: left; padding: 12px 16px;
    border-radius: 12px; border: 1px solid #e5e7eb;
    background: #fff; font-size: 13px; color: #4b5563;
    cursor: pointer; transition: all .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
    font-family: inherit;
  }
  .suggestion-btn:hover { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
  .suggestion-btn:active { transform: scale(.98); }

  /* ── Bubbles ── */
  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 4px 12px;
  }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar {
    display: none;
  }
  .bubble {
    max-width: 72%; padding: 10px 14px;
    font-size: 14px; line-height: 1.65;
    word-break: break-word; white-space: pre-wrap;
  }
  .bubble.bot {
    background: #fff;
    border-radius: 16px 16px 16px 4px; color: #1f2937;
  }
  .bubble.user {
    background: #f3f4f6; border-radius: 16px 16px 4px 16px; color: #111;
  }
  .msg-time { font-size: 10px; color: #d1d5db; margin-top: 2px; padding: 0 4px; }
  .msg-row.user .msg-time { text-align: right; }

  /* ── Thinking ── */
  #thinking { display: none; padding: 4px 12px; }
  .dots {
    background: #fff;
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px; display: flex; gap: 5px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #60a5fa; animation: bounce 1s infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Error ── */
  #error-bar {
    display: none; margin: 4px 12px; padding: 10px 14px;
    border-radius: 12px; background: #fef2f2; border: 1px solid #fecaca;
    font-size: 13px; color: #dc2626;
    justify-content: space-between; align-items: center; gap: 12px;
  }
  #retry-btn {
    flex-shrink: 0; font-size: 12px; color: #ef4444;
    border: 1px solid #fca5a5; border-radius: 999px;
    padding: 4px 12px; background: none; cursor: pointer;
    font-family: inherit;
  }

  /* ── Input ── */
  #input-bar {
    flex-shrink: 0; border-top: 1px solid #e5e7eb; background: #fff;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  #input-row { display: flex; align-items: flex-end; gap: 8px; max-width: 680px; margin: 0 auto; }
  #text-input {
    flex: 1; min-height: 44px; max-height: 140px;
    border: 1px solid #d1d5db; border-radius: 22px;
    padding: 10px 16px; font-size: 16px; font-family: inherit;
    line-height: 1.5; resize: none; background: #f9fafb; color: #111;
    outline: none; overflow-y: auto;
    transition: border-color .15s, box-shadow .15s;
  }
  #text-input:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96,165,250,.15);
    background: #fff;
  }
  #text-input::placeholder { color: #9ca3af; }
  #send-btn {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%;
    background: #2563eb; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, opacity .15s;
  }
  #send-btn:hover { background: #1d4ed8; }
  #send-btn:disabled { opacity: .3; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  .bubble strong { font-weight: 600; }
  .bubble code {
    background: #f3f4f6; border-radius: 4px;
    padding: 1px 5px; font-size: 12px;
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>

<!-- Backdrop for mobile sidebar -->
<div id="backdrop" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>历史对话</span>
    <button id="new-chat-btn" onclick="newChat()" title="新建对话">
      <svg viewBox="0 0 1024 1024" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M864 480H544V160a32 32 0 10-64 0v320H160a32 32 0 100 64h320v320a32 32 0 1064 0V544h320a32 32 0 100-64z" fill="#6b7280"/></svg>
    </button>
  </div>
  <div id="conv-list">
    <div id="conv-empty">
      <svg viewBox="0 0 1024 1024" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><path d="M873.6 326.4L697.6 150.4c-12.8-12.8-28.8-19.2-44.8-19.2H256c-35.2 0-64 28.8-64 64v633.6c0 35.2 28.8 64 64 64h512c35.2 0 64-28.8 64-64V371.2c0-16-6.4-32-19.2-44.8zM320 384h192c19.2 0 32 12.8 32 32s-12.8 32-32 32H320c-19.2 0-32-12.8-32-32s12.8-32 32-32z m384 320H320c-19.2 0-32-12.8-32-32s12.8-32 32-32h384c19.2 0 32 12.8 32 32s-12.8 32-32 32z m0-128H320c-19.2 0-32-12.8-32-32s12.8-32 32-32h384c19.2 0 32 12.8 32 32s-12.8 32-32 32z" fill="#d1d5db"/></svg>
      <span>还没有对话记录</span>
    </div>
  </div>
</div>

<!-- Main content -->
<div id="main">
  <!-- Top nav -->
  <div id="nav">
    <div id="nav-left">
      <button id="menu-btn" onclick="toggleSidebar()" title="历史对话">
        <svg viewBox="0 0 1024 1024" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M170.666667 213.333333h682.666666v85.333334H170.666667V213.333333z m0 512h682.666666v85.333334H170.666667v-85.333334z m0-256h682.666666v85.333334H170.666667v-85.333334z" fill="#444444"/></svg>
      </button>
      <span style="font-size:20px">🔧</span>
      <span id="nav-title">飞奕E50空调诊断医生</span>
      <span id="nav-badge">AI 诊断</span>
    </div>
    <div>
      <button id="delete-btn" onclick="deleteConv()" title="删除对话">
        <svg viewBox="0 0 1024 1024" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M360 184h-8c4.4 0 8-3.6 8-8v8h304v-8c0 4.4 3.6 8 8 8h-8v72h72v-80c0-35.3-28.7-64-64-64H352c-35.3 0-64 28.7-64 64v80h72v-72z" fill="#999"/><path d="M864 256H160c-17.7 0-32 14.3-32 32v32c0 4.4 3.6 8 8 8h60.4l24.7 523c1.6 34.1 29.8 61 63.9 61h454c34.2 0 62.3-26.8 63.9-61l24.7-523H888c4.4 0 8-3.6 8-8v-32c0-17.7-14.3-32-32-32zM731.3 840H292.7l-24.2-512h487l-24.2 512z" fill="#999"/></svg>
      </button>
    </div>
  </div>

  <!-- Message list -->
  <div id="messages">
    <div id="welcome">
      <div id="welcome-icon">🔧</div>
      <h1>飞奕E50空调诊断医生</h1>
      <p>描述您的空调故障症状，我来帮您分析原因和解决方案</p>
      <div id="suggestions">
        <p>快速提问</p>
        <button class="suggestion-btn" onclick="sendText('空调不制冷，压缩机有噪音')">空调不制冷，压缩机有噪音</button>
        <button class="suggestion-btn" onclick="sendText('显示 E1 错误代码，无法启动')">显示 E1 错误代码，无法启动</button>
        <button class="suggestion-btn" onclick="sendText('开机后频繁跳闸断电')">开机后频繁跳闸断电</button>
        <button class="suggestion-btn" onclick="sendText('内机漏水，地板被打湿')">内机漏水，地板被打湿</button>
      </div>
    </div>

    <div id="thinking">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div id="error-bar">
      <span id="error-text"></span>
      <button id="retry-btn" onclick="retry()">重试</button>
    </div>

    <div id="scroll-anchor"></div>
  </div>

  <!-- Input -->
  <div id="input-bar">
    <div id="input-row">
      <textarea id="text-input" rows="1" placeholder="描述空调故障症状…" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="handleSend()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var API_KEY     = 'sk-5082aa3e2da84c35be95dce5a8273e6a';
var APP_URL     = 'https://dashscope.aliyuncs.com/api/v1/apps/93abde237c6a4fd5ac06dac238edb184/completion';
var STORAGE_KEY = 'ac-doctor-conversations';

var conversations = [];
var activeId      = null;
var isThinking    = false;
var snapshotMsgs  = [];

var sidebarEl   = document.getElementById('sidebar');
var backdropEl  = document.getElementById('backdrop');
var convListEl  = document.getElementById('conv-list');
var convEmptyEl = document.getElementById('conv-empty');
var messagesEl  = document.getElementById('messages');
var welcomeEl   = document.getElementById('welcome');
var thinkingEl  = document.getElementById('thinking');
var errorBar    = document.getElementById('error-bar');
var errorText   = document.getElementById('error-text');
var inputEl     = document.getElementById('text-input');
var sendBtn     = document.getElementById('send-btn');
var deleteBtn   = document.getElementById('delete-btn');
var anchor      = document.getElementById('scroll-anchor');

// Load saved conversations
try {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) conversations = JSON.parse(saved);
} catch(e) {}
renderSidebar();

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations.slice(0, 50))); } catch(e) {}
}

function isMobile() { return window.innerWidth < 900; }

function toggleSidebar() {
  if (isMobile()) {
    var opening = !sidebarEl.classList.contains('open');
    sidebarEl.classList.toggle('open', opening);
    backdropEl.classList.toggle('open', opening);
  } else {
    sidebarEl.classList.toggle('collapsed');
  }
}

function closeSidebar() {
  sidebarEl.classList.remove('open');
  backdropEl.classList.remove('open');
}

function relativeTime(ts) {
  var d = Date.now() - ts;
  var m = Math.floor(d / 60000);
  var h = Math.floor(d / 3600000);
  var day = Math.floor(d / 86400000);
  if (m < 1)   return '刚刚';
  if (m < 60)  return m + ' 分钟前';
  if (h < 24)  return h + ' 小时前';
  if (day < 30) return day + ' 天前';
  var dt = new Date(ts);
  return (dt.getMonth()+1) + '月' + dt.getDate() + '日';
}

function renderSidebar() {
  var items = convListEl.querySelectorAll('.conv-item');
  for (var i = 0; i < items.length; i++) items[i].remove();
  convEmptyEl.style.display = conversations.length === 0 ? 'flex' : 'none';

  for (var j = 0; j < conversations.length; j++) {
    var conv = conversations[j];
    var btn = document.createElement('button');
    btn.className = 'conv-item' + (conv.id === activeId ? ' active' : '');
    btn.innerHTML = '<div class="conv-item-title">' + escHtml(conv.title) + '</div><div class="conv-item-time">' + relativeTime(conv.updatedAt) + '</div>';
    btn.setAttribute('data-id', conv.id);
    btn.onclick = (function(id) { return function() { loadConv(id); }; })(conv.id);
    convListEl.appendChild(btn);
  }
}

function activeConv() {
  for (var i = 0; i < conversations.length; i++) {
    if (conversations[i].id === activeId) return conversations[i];
  }
  return null;
}

function newChat() {
  activeId = null;
  isThinking = false;
  hideError();
  renderMessages([]);
  renderSidebar();
  deleteBtn.classList.remove('visible');
  closeSidebar();
}

function loadConv(id) {
  if (id === activeId) { closeSidebar(); return; }
  activeId = id;
  isThinking = false;
  hideError();
  var conv = activeConv();
  renderMessages(conv ? conv.messages : []);
  renderSidebar();
  deleteBtn.classList.toggle('visible', !!conv);
  closeSidebar();
}

function deleteConv() {
  if (!activeId || !confirm('确认删除这条对话记录？')) return;
  conversations = conversations.filter(function(c) { return c.id !== activeId; });
  persist();
  newChat();
}

function renderMessages(msgs) {
  var rows = messagesEl.querySelectorAll('.msg-row');
  for (var i = 0; i < rows.length; i++) rows[i].remove();
  welcomeEl.style.display = msgs.length === 0 ? 'flex' : 'none';
  for (var j = 0; j < msgs.length; j++) {
    appendBubble(msgs[j].role, msgs[j].content, msgs[j].time);
  }
  scrollBottom();
}

function appendBubble(role, content, time) {
  welcomeEl.style.display = 'none';
  var isUser = role === 'user';
  var row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');

  var av = document.createElement('div');
  av.className = 'avatar ' + (isUser ? 'user-av' : 'bot');
  av.textContent = isUser ? '我' : '🔧';

  var wrap = document.createElement('div');
  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isUser ? 'user' : 'bot');
  bubble.innerHTML = isUser ? escHtml(content).replace(/\n/g,'<br>') : renderMd(content);

  var ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = time || nowTime();

  wrap.appendChild(bubble);
  wrap.appendChild(ts);
  row.appendChild(av);
  row.appendChild(wrap);
  messagesEl.insertBefore(row, thinkingEl);
  scrollBottom();
}

function handleSend() {
  var text = inputEl.value.trim();
  if (!text || isThinking) return;
  sendText(text);
}

function sendText(text) {
  if (!text || isThinking) return;
  hideError();
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  var time = nowTime();

  if (!activeId) {
    activeId = String(Date.now());
    var title = text.length > 24 ? text.slice(0, 24) + '…' : text;
    conversations.unshift({ id: activeId, title: title, messages: [], updatedAt: Date.now() });
    deleteBtn.classList.add('visible');
  }

  var conv = activeConv();
  conv.messages.push({ role: 'user', content: text, time: time });
  conv.updatedAt = Date.now();
  persist();
  renderSidebar();
  appendBubble('user', text, time);

  snapshotMsgs = conv.messages.map(function(m) { return { role: m.role, content: m.content }; });
  callAI(snapshotMsgs);
}

function buildHistory(msgs) {
  var history = [];
  for (var i = 0; i < msgs.length - 1; i += 2) {
    if (msgs[i].role === 'user' && msgs[i+1] && msgs[i+1].role === 'assistant') {
      history.push({ user: msgs[i].content, bot: msgs[i+1].content });
    }
  }
  return history;
}

function createStreamBubble() {
  welcomeEl.style.display = 'none';
  var row = document.createElement('div');
  row.className = 'msg-row bot';
  var av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = '🔧';
  var wrap = document.createElement('div');
  var bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '';
  var ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = nowTime();
  wrap.appendChild(bubble);
  wrap.appendChild(ts);
  row.appendChild(av);
  row.appendChild(wrap);
  messagesEl.insertBefore(row, thinkingEl);
  return bubble;
}

function callAI(msgs) {
  setThinking(true);
  var convId = activeId;
  var lastMsg = msgs[msgs.length - 1];
  var history = buildHistory(msgs.slice(0, -1));

  fetch(APP_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + API_KEY,
      'X-DashScope-SSE': 'enable'
    },
    body: JSON.stringify({
      input: { prompt: lastMsg.content, history: history.slice(-10) },
      parameters: { incremental_output: true }
    })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.text().then(function(t) {
        var msg = 'HTTP ' + res.status;
        try { msg = JSON.parse(t).message || msg; } catch(e) {}
        throw new Error(msg);
      });
    }

    var bubble = null;
    var fullText = '';
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function pump() {
      return reader.read().then(function(result) {
        if (result.done) {
          setThinking(false);
          finishStream(convId, fullText);
          return;
        }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.indexOf('data:') !== 0) continue;
          var jsonStr = line.slice(5);
          try {
            var data = JSON.parse(jsonStr);
            if (data.output && data.output.text) {
              if (!bubble) {
                setThinking(false);
                bubble = createStreamBubble();
              }
              fullText += data.output.text;
              bubble.innerHTML = renderMd(fullText);
              scrollBottom();
            }
          } catch(e) {}
        }
        return pump();
      });
    }

    return pump();
  })
  .catch(function(err) {
    setThinking(false);
    showError(err.message || '请求失败，请检查网络或 API Key');
  });
}

function finishStream(convId, fullText) {
  var reply = fullText || '（无响应）';
  var time = nowTime();
  for (var i = 0; i < conversations.length; i++) {
    if (conversations[i].id === convId) {
      conversations[i].messages.push({ role: 'assistant', content: reply, time: time });
      conversations[i].updatedAt = Date.now();
      break;
    }
  }
  persist();
  renderSidebar();
}

function retry() {
  hideError();
  callAI(snapshotMsgs);
}

function setThinking(val) {
  isThinking = val;
  thinkingEl.style.display = val ? 'block' : 'none';
  sendBtn.disabled = val || !inputEl.value.trim();
  if (val) scrollBottom();
}

function showError(msg) { errorBar.style.display = 'flex'; errorText.textContent = '⚠️ ' + msg; scrollBottom(); }
function hideError()     { errorBar.style.display = 'none'; }
function scrollBottom()  { anchor.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
function nowTime()       { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false }); }

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  sendBtn.disabled = isThinking || !el.value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMd(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}
</script>
