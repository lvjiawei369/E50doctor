<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>飞奕AI空调诊断医生</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #fff;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Backdrop ── */
  #backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,.25);
  }
  #backdrop.open { display: block; }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 260px;
    z-index: 50;
    background: #f9fafb;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform .22s ease;
  }
  #sidebar.open {
    transform: translateX(0);
  }
  @media (min-width: 900px) {
    #sidebar {
      position: relative;
      transform: none;
      transition: none;
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      display: none;
    }
    #backdrop { display: none !important; }
  }

  #sidebar-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 52px;
    border-bottom: 1px solid #e5e7eb;
  }
  #sidebar-header span { font-size: 13px; font-weight: 600; color: #374151; }

  #new-chat-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none; background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  #new-chat-btn:hover { background: #e5e7eb; }

  #conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #conv-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px;
    padding: 40px 0;
    color: #9ca3af; font-size: 12px;
  }

  .conv-wrap {
    position: relative;
    overflow: hidden;
  }
  .conv-inner {
    display: flex;
    width: 100%;
    transition: transform .2s ease;
    touch-action: pan-y;
  }
  .conv-item {
    flex-shrink: 0;
    width: 100%; text-align: left;
    padding: 10px 14px;
    border: none; background: #f9fafb; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    font-family: inherit;
    transition: background .12s;
  }
  .conv-item:hover { background: #f3f4f6; }
  .conv-wrap.active .conv-item { background: #eff6ff; border-right: 2px solid #2563eb; }
  .conv-item-title {
    font-size: 13px; color: #374151;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px;
  }
  .conv-wrap.active .conv-item-title { color: #1d4ed8; font-weight: 500; }
  .conv-item-time { font-size: 11px; color: #9ca3af; }
  .conv-del-btn {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 70px;
    background: #ef4444;
    color: #fff;
    font-size: 13px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .conv-del-btn:hover { background: #dc2626; }
  .conv-wrap.swiped .conv-del-btn {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Main ── */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Nav ── */
  #nav {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    height: 52px;
    border-bottom: 1px solid #e5e7eb;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
  }
  #nav-left { display: flex; align-items: center; gap: 8px; }
  #nav-title { font-size: 15px; font-weight: 600; color: #111; }
  #nav-badge {
    font-size: 11px; color: #2563eb;
    border: 1px solid #bfdbfe; background: #eff6ff;
    border-radius: 999px; padding: 2px 8px;
    display: none; align-items: center; gap: 4px;
  }
  @media (min-width: 420px) { #nav-badge { display: flex; } }
  #nav-badge::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%; background: #3b82f6;
  }

  #menu-btn {
    flex-shrink: 0;
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
    transition: background .15s;
  }
  #menu-btn:hover { background: #f3f4f6; }

  #new-conv-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none; background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
  }
  #new-conv-btn:hover { background: #f3f4f6; }
  #tts-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none; background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s;
    color: #9ca3af;
  }
  #tts-btn:hover { background: #f3f4f6; }
  #tts-btn.active { color: #2563eb; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    background: #f9fafb;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
  }

  /* ── Welcome ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px 20px;
  }
  #welcome-icon {
    width: 76px; height: 76px; border-radius: 50%;
    background: #eff6ff; border: 1px solid #dbeafe;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin-bottom: 16px;
  }
  #welcome h1 { font-size: 28px; font-weight: 700; color: #111; margin-bottom: 8px; }
  #welcome p  { font-size: 13px; color: #6b7280; text-align: center; line-height: 1.6; margin-bottom: 24px; max-width: 280px; }
  #suggestions { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
  #suggestions > p { font-size: 11px; color: #9ca3af; text-align: center; margin-bottom: 4px; }
  .suggestion-btn {
    text-align: left; padding: 12px 16px;
    border-radius: 12px; border: 1px solid #e5e7eb;
    background: #fff; font-size: 13px; color: #4b5563;
    cursor: pointer; transition: all .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
    font-family: inherit;
  }
  .suggestion-btn:hover { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
  .suggestion-btn:active { transform: scale(.98); }
  #refresh-btn {
    align-self: center;
    margin-top: 12px;
    font-size: 12px; color: #9ca3af;
    border: 1px solid #e5e7eb; border-radius: 999px;
    padding: 4px 14px; background: none; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  #refresh-btn:hover { color: #6b7280; border-color: #d1d5db; }

  /* ── Messages ── */
  .msg-row {
    padding: 12px 16px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .msg-row + .msg-row { border-top: 1px solid #f3f4f6; }

  .msg-row.user {
    align-items: flex-end;
  }
  .msg-row.user .msg-body {
    background: #f3f4f6;
    border-radius: 16px 16px 4px 16px;
    padding: 10px 14px;
    max-width: 80%;
    white-space: pre-wrap;
    color: #111;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .msg-row.user .msg-time { text-align: right; }
  .msg-row.user .msg-label { display: none; }

  .msg-label {
    font-size: 12px; font-weight: 600; margin-bottom: 6px;
    color: #2563eb;
  }
  .msg-body {
    font-size: 14px; line-height: 1.75; color: #1f2937;
    word-break: break-word;
  }
  .msg-time { font-size: 10px; color: #d1d5db; margin-top: 4px; }
  .msg-actions { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
  .msg-row.user .msg-actions { display: none; }
  .act-btn { background: none; border: none; padding: 2px 3px; cursor: pointer; color: #c9cdd4; line-height: 0; border-radius: 4px; transition: color 0.15s; }
  .act-btn:active { color: #2563eb; }
  .act-btn.copied { color: #16a34a; }

  /* ── Markdown content ── */
  .msg-body h1 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; }
  .msg-body h2 { font-size: 17px; font-weight: 700; margin: 14px 0 6px; }
  .msg-body h3 { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
  .msg-body h1:first-child, .msg-body h2:first-child, .msg-body h3:first-child { margin-top: 0; }
  .msg-body p { margin: 8px 0; }
  .msg-body p:first-child { margin-top: 0; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body ul, .msg-body ol { margin: 8px 0; padding-left: 20px; }
  .msg-body li { margin: 4px 0; }
  .msg-body li > ul, .msg-body li > ol { margin: 2px 0; }
  .msg-body strong { font-weight: 600; }
  .msg-body em { font-style: italic; }
  .msg-body code {
    background: #f3f4f6; border-radius: 4px;
    padding: 1px 5px; font-size: 12px;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  .msg-body pre {
    background: #1f2937; color: #e5e7eb;
    border-radius: 8px; padding: 12px 16px;
    margin: 8px 0; overflow-x: auto;
    font-size: 12px; line-height: 1.6;
  }
  .msg-body pre code {
    background: none; padding: 0; color: inherit; font-size: inherit;
  }
  .msg-body blockquote {
    border-left: 3px solid #d1d5db;
    padding-left: 12px; margin: 8px 0;
    color: #6b7280;
  }
  .msg-body hr {
    border: none; border-top: 1px solid #e5e7eb;
    margin: 12px 0;
  }
  .msg-body a { color: #2563eb; text-decoration: underline; }
  .msg-body table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
  .msg-body th, .msg-body td { border: 1px solid #e5e7eb; padding: 6px 10px; text-align: left; }
  .msg-body th { background: #f9fafb; font-weight: 600; }

  /* ── Thinking ── */
  #thinking { display: none; padding: 12px 16px; }
  .thinking-inner { display: flex; flex-direction: column; gap: 6px; }
  .dots {
    display: flex; gap: 5px; padding: 4px 0;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #60a5fa; animation: bounce 1s infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  .thinking-text { font-size: 11px; color: #9ca3af; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Error ── */
  #error-bar {
    display: none; margin: 4px 12px; padding: 10px 14px;
    border-radius: 12px; background: #fef2f2; border: 1px solid #fecaca;
    font-size: 13px; color: #dc2626;
    justify-content: space-between; align-items: center; gap: 12px;
  }
  #retry-btn {
    flex-shrink: 0; font-size: 12px; color: #ef4444;
    border: 1px solid #fca5a5; border-radius: 999px;
    padding: 4px 12px; background: none; cursor: pointer;
    font-family: inherit;
  }

  /* ── Input ── */
  #input-bar {
    flex-shrink: 0; border-top: 1px solid #e5e7eb; background: #fff;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  #input-row { display: flex; align-items: flex-end; gap: 8px; max-width: 680px; margin: 0 auto; }
  #text-input {
    flex: 1; min-height: 44px; max-height: 140px;
    border: 1px solid #d1d5db; border-radius: 22px;
    padding: 11px 16px 8px; font-size: 14px; font-family: inherit;
    line-height: 1.5; resize: none; background: #f9fafb; color: #111;
    outline: none; overflow-y: auto;
    transition: border-color .15s, box-shadow .15s;
  }
  #text-input:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96,165,250,.15);
    background: #fff;
  }
  #text-input::placeholder { color: #9ca3af; }
  #send-btn {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%;
    background: #2563eb; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, opacity .15s;
  }
  #send-btn:hover { background: #1d4ed8; }
  #send-btn:disabled { opacity: .3; cursor: default; }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  #voice-btn {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%;
    background: #fff; border: 1px solid #d1d5db;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s; padding: 0;
  }
  #voice-btn:hover { background: #f3f4f6; }
  #voice-btn.recording {
    background: #ef4444; border-color: #ef4444;
    animation: pulse-ring 1.5s infinite;
  }
  #voice-btn.recording svg path { fill: #fff; }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
    70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

</style>
</head>
<body>

<!-- Backdrop for mobile sidebar -->
<div id="backdrop" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <span>历史对话</span>
    <button id="new-chat-btn" onclick="newChat()" title="新建对话">
      <svg viewBox="0 0 1024 1024" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M864 480H544V160a32 32 0 10-64 0v320H160a32 32 0 100 64h320v320a32 32 0 1064 0V544h320a32 32 0 100-64z" fill="#6b7280"/></svg>
    </button>
  </div>
  <div id="conv-list">
    <div id="conv-empty">
      <svg viewBox="0 0 1024 1024" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><path d="M873.6 326.4L697.6 150.4c-12.8-12.8-28.8-19.2-44.8-19.2H256c-35.2 0-64 28.8-64 64v633.6c0 35.2 28.8 64 64 64h512c35.2 0 64-28.8 64-64V371.2c0-16-6.4-32-19.2-44.8zM320 384h192c19.2 0 32 12.8 32 32s-12.8 32-32 32H320c-19.2 0-32-12.8-32-32s12.8-32 32-32z m384 320H320c-19.2 0-32-12.8-32-32s12.8-32 32-32h384c19.2 0 32 12.8 32 32s-12.8 32-32 32z m0-128H320c-19.2 0-32-12.8-32-32s12.8-32 32-32h384c19.2 0 32 12.8 32 32s-12.8 32-32 32z" fill="#d1d5db"/></svg>
      <span>还没有对话记录</span>
    </div>
  </div>
</div>

<!-- Main content -->
<div id="main">
  <!-- Top nav -->
  <div id="nav">
    <div id="nav-left">
      <button id="menu-btn" onclick="toggleSidebar()" title="历史对话">
        <svg viewBox="0 0 1024 1024" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M170.666667 213.333333h682.666666v85.333334H170.666667V213.333333z m0 512h682.666666v85.333334H170.666667v-85.333334z m0-256h682.666666v85.333334H170.666667v-85.333334z" fill="#444444"/></svg>
      </button>
      <img src="logo.png" width="28" height="28" style="border-radius:4px;flex-shrink:0;" alt="飞奕logo">
      <span id="nav-title">飞奕AI空调诊断医生</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button id="tts-btn" onclick="toggleTTS()" title="语音播报">

<script>
var PROXY_URL   = 'https://ac-doctor-proxy-kxiujcaqwq.cn-qingdao.fcapp.run';
var STORAGE_KEY = 'ac-doctor-conversations';

var conversations = [];
var activeId      = null;
var isThinking    = false;
var snapshotText  = '';

var sidebarEl   = document.getElementById('sidebar');
var backdropEl  = document.getElementById('backdrop');
var convListEl  = document.getElementById('conv-list');
var convEmptyEl = document.getElementById('conv-empty');
var messagesEl  = document.getElementById('messages');
var welcomeEl   = document.getElementById('welcome');
var thinkingEl  = document.getElementById('thinking');
var errorBar    = document.getElementById('error-bar');
var errorText   = document.getElementById('error-text');
var inputEl     = document.getElementById('text-input');
var sendBtn     = document.getElementById('send-btn');
var anchor      = document.getElementById('scroll-anchor');

// Load saved conversations
try {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) conversations = JSON.parse(saved);
} catch(e) {}
renderSidebar();

// 点击列表外部收回所有已展开的删除按钮（只注册一次）
document.addEventListener('click', function(e) {
  if (!convListEl.contains(e.target)) {
    var swiped = convListEl.querySelectorAll('.conv-wrap.swiped');
    for (var i = 0; i < swiped.length; i++) {
      swiped[i].classList.remove('swiped');
      var inner = swiped[i].querySelector('.conv-inner');
      if (inner) { inner.style.transition = 'transform .2s ease'; inner.style.transform = 'translateX(0)'; }
    }
  }
});

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations.slice(0, 50))); } catch(e) {}
}

function isMobile() { return window.innerWidth < 900; }

function toggleSidebar() {
  if (isMobile()) {
    var opening = !sidebarEl.classList.contains('open');
    sidebarEl.classList.toggle('open', opening);
    backdropEl.classList.toggle('open', opening);
  } else {
    sidebarEl.classList.toggle('collapsed');
  }
}

function closeSidebar() {
  sidebarEl.classList.remove('open');
  backdropEl.classList.remove('open');
}

function relativeTime(ts) {
  var d = Date.now() - ts;
  var m = Math.floor(d / 60000);
  var h = Math.floor(d / 3600000);
  var day = Math.floor(d / 86400000);
  if (m < 1)   return '刚刚';
  if (m < 60)  return m + ' 分钟前';
  if (h < 24)  return h + ' 小时前';
  if (day < 30) return day + ' 天前';
  var dt = new Date(ts);
  return (dt.getMonth()+1) + '月' + dt.getDate() + '日';
}

function deleteConv(id) {
  conversations = conversations.filter(function(c) { return c.id !== id; });
  if (activeId === id) { activeId = null; msgEl.innerHTML = ''; renderQuickQuestions(); }
  localStorage.setItem('ac_convs', JSON.stringify(conversations));
  renderSidebar();
}

function renderSidebar() {
  var wraps = convListEl.querySelectorAll('.conv-wrap');
  for (var i = 0; i < wraps.length; i++) wraps[i].remove();
  convEmptyEl.style.display = conversations.length === 0 ? 'flex' : 'none';

  for (var j = 0; j < conversations.length; j++) {
    var conv = conversations[j];
    var wrap = document.createElement('div');
    wrap.className = 'conv-wrap' + (conv.id === activeId ? ' active' : '');

    var inner = document.createElement('div');
    inner.className = 'conv-inner';

    var btn = document.createElement('button');
    btn.className = 'conv-item';
    btn.innerHTML = '<div class="conv-item-title">' + escHtml(conv.title) + '</div><div class="conv-item-time">' + relativeTime(conv.updatedAt) + '</div>';
    btn.onclick = (function(id) { return function() { loadConv(id); }; })(conv.id);

    var del = document.createElement('button');
    del.className = 'conv-del-btn';
    del.textContent = '删除';
    del.onclick = (function(id) { return function(e) { e.stopPropagation(); deleteConv(id); }; })(conv.id);

    inner.appendChild(btn);
    wrap.appendChild(inner);
    wrap.appendChild(del);

    (function(innerEl, wrapEl) {
      var startX = 0, startY = 0, dx = 0, swiping = false;
      innerEl.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        dx = 0; swiping = false;
        innerEl.style.transition = 'none';
      });
      innerEl.addEventListener('touchmove', function(e) {
        var moveX = e.touches[0].clientX - startX;
        var moveY = e.touches[0].clientY - startY;
        if (!swiping && Math.abs(moveY) > Math.abs(moveX)) return;
        swiping = true;
        dx = Math.min(0, moveX);
        dx = Math.max(dx, -70);
        innerEl.style.transform = 'translateX(' + dx + 'px)';
      });
      innerEl.addEventListener('touchend', function() {
        innerEl.style.transition = 'transform .2s ease';
        if (dx < -35) {
          innerEl.style.transform = 'translateX(-70px)';
          wrapEl.classList.add('swiped');
        } else {
          innerEl.style.transform = 'translateX(0)';
          wrapEl.classList.remove('swiped');
        }
      });
    })(inner, wrap);

    convListEl.appendChild(wrap);
  }
}

function activeConv() {
  for (var i = 0; i < conversations.length; i++) {
    if (conversations[i].id === activeId) return conversations[i];
  }
  return null;
}

function newChat() {
  activeId = null;
  isThinking = false;
  hideError();
  renderMessages([]);
  renderSidebar();
  renderQuickQuestions();
  closeSidebar();
}

function loadConv(id) {
  if (id === activeId) { closeSidebar(); return; }
  activeId = id;
  isThinking = false;
  hideError();
  var conv = activeConv();
  renderMessages(conv ? conv.messages : []);
  renderSidebar();
  closeSidebar();
}


function renderMessages(msgs) {
  var rows = messagesEl.querySelectorAll('.msg-row');
  for (var i = 0; i < rows.length; i++) rows[i].remove();
  welcomeEl.style.display = msgs.length === 0 ? 'flex' : 'none';
  for (var j = 0; j < msgs.length; j++) {
    appendBubble(msgs[j].role, msgs[j].content, msgs[j].time);
  }
  scrollBottom();
}

function makeActions(bodyEl) {
  var wrap = document.createElement('div');
  wrap.className = 'msg-actions';

  // 播放语音
  var playBtn = document.createElement('button');
  playBtn.className = 'act-btn';
  playBtn.title = '播放语音';
  playBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  playBtn.onclick = function() {
    var text = (bodyEl.innerText || bodyEl.textContent || '').replace(/\n+/g, '，');
    if (!text) return;
    var plain = text.replace(/[#*`>\-_~\[\]()]/g, '');
    fetch(PROXY_URL + '/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: plain })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.url) { var a = new Audio(d.url); a.play(); } })
    .catch(function() {});
  };

  // 复制
  var copyBtn = document.createElement('button');
  copyBtn.className = 'act-btn';
  copyBtn.title = '复制';
  copyBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  copyBtn.onclick = function() {
    var text = bodyEl.innerText || bodyEl.textContent || '';
    navigator.clipboard.writeText(text).then(function() {
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(function() {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 2000);
    }).catch(function() {});
  };

  wrap.appendChild(playBtn);
  wrap.appendChild(copyBtn);
  return wrap;
}

function appendBubble(role, content, time) {
  welcomeEl.style.display = 'none';
  var isUser = role === 'user';
  var row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');

  var label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = isUser ? '你' : '🔧 AI 诊断';

  var body = document.createElement('div');
  body.className = 'msg-body';
  body.innerHTML = isUser ? escHtml(content).replace(/\n/g,'<br>') : renderMd(content);

  var ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = time || nowTime();

  row.appendChild(label);
  row.appendChild(body);
  if (!isUser) row.appendChild(makeActions(body));
  row.appendChild(ts);
  messagesEl.insertBefore(row, thinkingEl);
  scrollBottom();
}

function handleSend() {
  var text = inputEl.value.trim();
  if (!text || isThinking) return;
  sendText(text);
}

function sendText(text) {
  if (!text || isThinking) return;
  unlockAudio();
  hideError();
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  var time = nowTime();

  if (!activeId) {
    activeId = String(Date.now());
    var title = text.length > 24 ? text.slice(0, 24) + '…' : text;
    conversations.unshift({ id: activeId, title: title, messages: [], updatedAt: Date.now() });
  }

  var conv = activeConv();
  conv.messages.push({ role: 'user', content: text, time: time });
  conv.updatedAt = Date.now();
  persist();
  renderSidebar();
  appendBubble('user', text, time);

  snapshotText = text;
  callAI(text, conv.sessionId);
}

function createStreamBubble() {
  welcomeEl.style.display = 'none';
  var row = document.createElement('div');
  row.className = 'msg-row bot';

  var label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = '🔧 AI 诊断';

  var body = document.createElement('div');
  body.className = 'msg-body';

  var ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = nowTime();

  row.appendChild(label);
  row.appendChild(body);
  row.appendChild(makeActions(body));
  row.appendChild(ts);
  messagesEl.insertBefore(row, thinkingEl);
  return body;
}

function callAI(prompt, sessionId) {
  setThinking(true);
  var convId = activeId;

  var reqBody = { prompt: prompt };
  if (sessionId) reqBody.session_id = sessionId;

  var bubble = null;
  var fullText = '';
  var returnedSessionId = null;

  fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(reqBody)
  })
  .then(function(res) {
    if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || 'HTTP ' + res.status); });
    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    function pump() {
      return reader.read().then(function(result) {
        if (result.done) {
          setThinking(false);
          finishStream(convId, fullText, returnedSessionId);
          return;
        }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.indexOf('data:') !== 0) continue;
          try {
            var data = JSON.parse(line.slice(5));
            if (data.output) {
              if (data.output.session_id && !returnedSessionId) returnedSessionId = data.output.session_id;
              if (data.output.text) {
                if (!bubble) { setThinking(false); bubble = createStreamBubble(); }
                fullText += data.output.text;
                bubble.innerHTML = renderMd(fullText);
                scrollBottom();
              }
            }
          } catch(e) {}
        }
        return pump();
      });
    }
    return pump();
  })
  .catch(function(err) {
    setThinking(false);
    showError(err.message || '请求失败，请检查网络');
  });
}

function finishStream(convId, fullText, returnedSessionId) {
  var reply = fullText || '（无响应）';
  var time = nowTime();
  for (var i = 0; i < conversations.length; i++) {
    if (conversations[i].id === convId) {
      conversations[i].messages.push({ role: 'assistant', content: reply, time: time });
      conversations[i].updatedAt = Date.now();
      if (returnedSessionId) conversations[i].sessionId = returnedSessionId;
      break;
    }
  }
  persist();
  renderSidebar();
  if (ttsEnabled && reply) {
    var plain = reply.replace(/[#*`>\-_~\[\]()]/g, '').replace(/\n+/g, '，');
    fetch(PROXY_URL + '/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: plain })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.url) {
        var audio = new Audio(d.url);
        audio.play();
      }
    })
    .catch(function() {});
  }
}

var audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var buf = ctx.createBuffer(1, 1, 22050);
  var src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  ctx.close();
}

var ttsEnabled = true;
var ttsBtnEl = null;
var ttsIconOn = null;
var ttsIconOff = null;
function toggleTTS() {
  ttsEnabled = !ttsEnabled;

function retry() {
  hideError();

function setThinking(val) {
  isThinking = val;
  thinkingEl.style.display = val ? 'block' : 'none';
  sendBtn.disabled = val || !inputEl.value.trim();
  if (val) scrollBottom();
}

function showError(msg) { errorBar.style.display = 'flex'; errorText.textContent = '⚠️ ' + msg; scrollBottom(); }
function hideError()     { errorBar.style.display = 'none'; }
function scrollBottom()  { anchor.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
function nowTime()       { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false }); }

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  sendBtn.disabled = isThinking || !el.value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMd(text) {
  // Extract code blocks first to protect them
  var codeBlocks = [];
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    codeBlocks.push('<pre><code>' + escHtml(code.replace(/\n$/, '')) + '</code></pre>');
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });

  var lines = text.split('\n');
  var html = '';
  var inUl = false, inOl = false, inTable = false, inBlockquote = false;
  var tableRows = [];

  function closeLists() {
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
  }
  function closeBlockquote() {
    if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
  }
  function closeTable() {
    if (inTable) {
      var thead = '<thead><tr>';
      var cols = tableRows[0];
      for (var c = 0; c < cols.length; c++) thead += '<th>' + inlineMd(cols[c].trim()) + '</th>';
      thead += '</tr></thead>';
      var tbody = '<tbody>';
      for (var r = 2; r < tableRows.length; r++) {
        tbody += '<tr>';
        for (var c2 = 0; c2 < tableRows[r].length; c2++) tbody += '<td>' + inlineMd(tableRows[r][c2].trim()) + '</td>';
        tbody += '</tr>';
      }
      tbody += '</tbody>';
      html += '<table>' + thead + tbody + '</table>';
      inTable = false;
      tableRows = [];
    }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Code block placeholder
    var cbMatch = line.match(/^\x00CB(\d+)\x00$/);
    if (cbMatch) { closeLists(); closeBlockquote(); closeTable(); html += codeBlocks[parseInt(cbMatch[1])]; continue; }

    // Table row
    if (line.match(/^\|(.+)\|$/)) {
      closeLists(); closeBlockquote();
      if (line.match(/^\|[\s\-:|]+\|$/)) { if (!inTable) { inTable = true; } continue; }
      var cells = line.slice(1, -1).split('|');
      if (!inTable) { inTable = true; }
      tableRows.push(cells);
      continue;
    } else { closeTable(); }

    // Heading
    var hMatch = line.match(/^(#{1,3})\s+(.+)$/);
    if (hMatch) { closeLists(); closeBlockquote(); var lvl = hMatch[1].length; html += '<h' + lvl + '>' + inlineMd(hMatch[2]) + '</h' + lvl + '>'; continue; }

    // HR
    if (line.match(/^[-*_]{3,}$/)) { closeLists(); closeBlockquote(); html += '<hr>'; continue; }

    // Blockquote
    if (line.match(/^>\s?/)) {
      closeLists();
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += inlineMd(line.replace(/^>\s?/, '')) + '<br>';
      continue;
    } else { closeBlockquote(); }

    // Unordered list
    if (line.match(/^[\s]*[-*+]\s+/)) {
      closeBlockquote(); closeTable();
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += '<li>' + inlineMd(line.replace(/^[\s]*[-*+]\s+/, '')) + '</li>';
      continue;
    }

    // Ordered list
    var olMatch = line.match(/^[\s]*(\d+)[.)]\s+(.+)$/);
    if (olMatch) {
      closeBlockquote(); closeTable();
      if (inUl) { html += '</ul>'; inUl = false; }
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + inlineMd(olMatch[2]) + '</li>';
      continue;
    }

    closeLists();

    // Empty line
    if (line.trim() === '') { continue; }

    // Paragraph
    html += '<p>' + inlineMd(line) + '</p>';
  }
  closeLists(); closeBlockquote(); closeTable();
  return html;
}

function inlineMd(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ── Voice input ──────────────────────────────────────────────
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var isRecording = false;
var voiceBtn = document.getElementById('voice-btn');

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = function(e) {
    var transcript = '';
    for (var i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    inputEl.value = transcript;
    autoGrow(inputEl);
    if (e.results[e.results.length - 1].isFinal) {
      stopVoice();
      if (transcript.trim()) handleSend();
    }
  };

  recognition.onerror = function(e) {
    stopVoice();
    var msg = {
      'not-allowed': '请在浏览器设置中允许麦克风权限',
      'no-speech': '未检测到语音，请重试',
      'network': '网络错误，请检查连接',
    }[e.error] || ('语音错误：' + e.error);
    showError(msg);
  };

  recognition.onend = function() { stopVoice(); };
} else {
  voiceBtn.style.display = 'none';
}

function toggleVoice() {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    recognition.start();
    isRecording = true;
    voiceBtn.classList.add('recording');
    inputEl.placeholder = '正在听...';
  }
}

function stopVoice() {
  isRecording = false;
  voiceBtn.classList.remove('recording');
  inputEl.placeholder = '描述空调故障症状…';
}

function renderQuickQuestions() {
  var container = document.getElementById('suggestions');
  var btns = container.querySelectorAll('.suggestion-btn');
  for (var i = 0; i < btns.length; i++) btns[i].remove();

  // Shuffle and pick 4
  var pool = QUESTIONS.slice();
  for (var j = pool.length - 1; j > 0; j--) {
    var k = Math.floor(Math.random() * (j + 1));
    var tmp = pool[j]; pool[j] = pool[k]; pool[k] = tmp;
  }
  var picked = pool.slice(0, 4);

  for (var n = 0; n < picked.length; n++) {
    var btn = document.createElement('button');
    btn.className = 'suggestion-btn';
    btn.textContent = picked[n];
    btn.onclick = (function(t) { return function() { sendText(t); }; })(picked[n]);
    container.appendChild(btn);
  }
}
